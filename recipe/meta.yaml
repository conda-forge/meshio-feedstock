{% set name = "meshio" %}
{% set version = "5.3.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f21f01abd9f29ba06ea119304b3d39e610421cfe93b9dd23362834919f87586d

build:
  noarch: python
  number: 1
  entry_points:
    - meshio = meshio._cli:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - importlib_metadata
    - numpy
    - netCDF4
    - rich
    - h5py

test:
  requires:
    - pytest
    - netCDF4
    - h5py
    - python {{ python_min }}
  source_files:
    - README.md
    - tests
  imports:
    - meshio
  commands:
    - meshio --help
    - python -m pytest

about:
  home: https://github.com/nschloe/meshio
  license: MIT
  license_file: LICENSE.txt
  license_family: MIT
  summary: I/O for various mesh formats

extra:
  recipe-maintainers:
    - nschloe
    - MuellerSeb
    - banesullivan
